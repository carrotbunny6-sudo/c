<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            background-color: #000; /* Black background like a real player */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px; /* Adjust max width as needed */
            aspect-ratio: 16 / 9;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <!-- Strictly using /preview and allowing autoplay -->
        <iframe 
            src="https://drive.google.com/file/d/1IY6x0aWFQUTRFT77PLec5ujRbdNeo7O5/preview?autoplay=1&mute=1" 
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
