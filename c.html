<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Video</title>
    <style>
        body {
            margin: 0;
            background-color: #222; /* Dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .video-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9; /* Keeps standard video proportions */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- 
          Notice the URL uses /preview instead of /view 
          ?autoplay=1 triggers autoplay
          allow="autoplay" grants browser permission
        -->
        <iframe 
            src="https://drive.google.com/file/d/1IY6x0aWFQUTRFT77PLec5ujRbdNeo7O5/preview?autoplay=1&mute=1" 
            allow="autoplay; fullscreen" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
